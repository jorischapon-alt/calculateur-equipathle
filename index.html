<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur Equip'Athlé Minimes</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/grid.css">
    <!-- html2pdf for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>
    <div class="app-container" id="app-content">

        <!-- Zone 1 : Le Bandeau Supérieur de Score -->
        <header class="dashboard">
            <div class="score-display">
                <h2>Total Équipe</h2>
                <div class="score-value" id="total-score">0</div>
            </div>

            <div class="team-options">
                <div class="relais-container" style="display:flex; align-items:center; gap: 10px; margin-bottom:10px;">
                    <span style="font-weight: 600; font-size: 1.1rem;">Relais Mixte 4x60m :</span>
                    <input type="text" id="relais-perf-input" placeholder="Temps (ex: 29.50)"
                        style="max-width: 150px; padding: 5px; border-radius:4px; border:1px solid var(--border-color);">
                    <span id="relais-points" class="points-badge">+0 pts</span>
                </div>
                <label class="checkbox-container">
                    <input type="checkbox" id="juge-checkbox">
                    <span class="checkmark"></span>
                    Jeune Juge
                    <!-- select for points level -->
                    <select id="juge-level" class="juge-select">
                        <option value="0">Aucun (0 pt)</option>
                        <option value="5">Non certifié (5 pts)</option>
                        <option value="20">Certifié Apprenti (20 pts)</option>
                        <option value="30">Certifié Confirmé (30 pts)</option>
                        <option value="40">Certifié Expérimenté (40 pts)</option>
                    </select>
                </label>
            </div>

            <div class="validation-flags">
                <div class="flag" id="flag-mixite">
                    <span class="icon">🔴</span> Mixité (2F/2G min)
                </div>
                <div class="flag" id="flag-relais">
                    <span class="icon">🔴</span> Relais 4x60m
                </div>
                <div class="flag" id="flag-triathlons">
                    <span class="icon">🟢</span> Triathlons
                </div>
                <div class="action-buttons">
                    <button id="btn-export" class="btn-primary">Exporter PDF</button>
                    <button id="btn-reset" class="btn-secondary">Réinitialiser</button>
                </div>
            </div>
        </header>

        <main class="main-content">
            <!-- Zone 2 : La Grille de Saisie -->
            <section class="grid-section">
                <h2>Grille de Compétition</h2>
                <div class="table-container">
                    <table id="competition-table">
                        <thead>
                            <tr>
                                <th>performance</th>
                                <th>G</th>
                                <th>Discipline</th>
                                <th>F</th>
                                <th>performance</th>
                            </tr>
                        </thead>
                        <tbody id="grid-body">
                            <!-- Rows will be generated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Zone 3 : Le Panneau Athlète (Sidebar) -->
            <aside class="sidebar-section">
                <h2>Radar des Athlètes</h2>
                <div id="athletes-list" class="athletes-list">
                    <!-- Athlete cards will be generated by JS -->
                    <div class="empty-state">Aucun athlète saisi.</div>
                </div>
            </aside>
        </main>
    </div>

    <script src="js/db.js"></script>
    <script src="js/data.js"></script>
    <script src="js/logic.js"></script>
    <script src="js/rules.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/export.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
